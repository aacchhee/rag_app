<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RAG Assistant</title>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; background: #f7f7f8; color: #111; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    .card { background: #fff; border-radius: 14px; box-shadow: 0 1px 6px rgba(0,0,0,.08); padding: 18px; }
    h1 { font-size: 20px; margin: 0 0 10px; }
    .muted { color: #666; font-size: 13px; }
    label { font-weight: 600; display: block; margin: 12px 0 6px; }
    textarea { width: 100%; min-height: 110px; resize: vertical; padding: 10px 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; box-sizing: border-box; }
    .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; margin-top: 12px; }
    button { border: 0; background: #111; color: #fff; padding: 10px 14px; border-radius: 10px; font-weight: 650; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    select { font-size: 14px; }
    .section { margin-top: 16px; }
    .section h2 { font-size: 16px; margin: 0 0 8px; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 999px; background: #eee; font-size: 12px; margin-left: 8px; }
    details { margin-top: 10px; }
    details > summary { cursor: pointer; font-weight: 650; }
    .err { color: #b00020; white-space: pre-wrap; margin-top: 10px; }
    .sources { margin-top: 10px; font-size: 13px; color: #333; }
    .sources ul { margin: 8px 0 0; padding-left: 18px; }
    code { background: #f1f1f1; padding: 1px 5px; border-radius: 6px; }

    /* Navigation topbar */
    .nav-topbar {
      display: flex;
      align-items: center;
      gap: 0;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .nav-topbar a {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 11px 20px;
      color: #aaa;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      transition: background .15s, color .15s;
      position: relative;
    }
    .nav-topbar a:hover {
      background: #222;
      color: #fff;
    }
    .nav-topbar a.active {
      background: #272727;
      color: #fff;
    }
    .nav-topbar a.active::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 16px;
      right: 16px;
      height: 2px;
      background: #4a9eff;
      border-radius: 2px;
    }
    .nav-topbar .nav-icon {
      font-size: 15px;
      line-height: 1;
    }
    .nav-topbar .spacer {
      flex: 1;
    }
    .nav-topbar .back-link {
      color: #6ba3e8;
      font-weight: 500;
      font-size: 13px;
      padding: 11px 18px;
    }
    .nav-topbar .back-link:hover {
      color: #9dc4f5;
      background: #1a1a1a;
    }

    .topbar { display:flex; justify-content: space-between; align-items:center; gap: 10px; margin-bottom: 10px; }
    .linkish { color: #0b57d0; text-decoration: none; }

    /* Markdown answer styling */
    .answer { border: 1px solid #eee; border-radius: 12px; padding: 12px 14px; background: #fcfcfc; }
    .answer p { margin: 0 0 10px; line-height: 1.6; }
    .answer p:last-child { margin-bottom: 0; }
    .answer ul, .answer ol { margin: 4px 0 10px; padding-left: 22px; }
    .answer li { margin-bottom: 4px; line-height: 1.5; }
    .answer h3, .answer h4 { margin: 14px 0 6px; font-size: 15px; }
    .answer pre { background: #f1f1f1; padding: 10px; border-radius: 8px; overflow-x: auto; }
    .answer code { font-size: 13px; }
    .answer blockquote { border-left: 3px solid #ddd; margin: 8px 0; padding: 4px 12px; color: #555; }
    .answer strong { font-weight: 650; }
  </style>

  <!-- Marked.js (lightweight markdown → HTML) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax (renders \( \) and \[ \]) -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre','code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
  <div class="wrap">

    <!-- Navigation topbar -->
    <nav class="nav-topbar">
      <a href="/rag2/" class="active" title="Ask a question">
        <span class="nav-icon">💬</span> Question
      </a>
      <a href="/rag2/quiz.html" title="Take a quiz">
        <span class="nav-icon">📝</span> Quiz
      </a>
      <span class="spacer"></span>
      <a class="back-link" href="/" title="Back to notes site"><- Notes</a>
    </nav>

    <div class="card">
      <div class="topbar">
        <h1>Notes-first RAG Assistant with qdrant</h1>
      </div>

      <div class="muted">
        Backend: <code>/rag2/ask</code> — UI: <code>/rag2/</code>.
      </div>

      <label for="q">Question</label>
      <textarea id="q" placeholder="Ask something… (math is OK)"></textarea>

      <div class="row">
        <button id="askBtn" type="button">Ask</button>

        <label class="muted" style="display:flex; align-items:center; gap:8px;">
          Extra mode:
          <select id="extraMode">
            <option value="auto" selected>auto</option>
            <option value="always">always</option>
            <option value="never">never</option>
          </select>
        </label>

        <span id="status" class="muted"></span>
      </div>

      <div class="section">
        <h2>From the notes <span id="cov" class="pill" style="display:none;"></span></h2>
        <div id="notes" class="answer"></div>

        <div id="sources" class="sources"></div>

        <details id="extraBox" style="display:none;">
          <summary>Extra context (not from notes)</summary>
          <div id="extra" class="answer" style="margin-top:10px;"></div>
        </details>

        <div id="err" class="err"></div>
      </div>
    </div>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }

    function setStatus(msg) { $("status").textContent = msg || ""; }
    function setError(msg) { $("err").textContent = msg || ""; }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function(c) {
        return ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" })[c];
      });
    }

    /**
     * Render markdown to HTML safely.
     * Protects LaTeX delimiters from being mangled by the markdown parser.
     */
    function renderMarkdown(text) {
      if (!text) return "";

      // 1. Protect LaTeX blocks by replacing them with placeholders
      var placeholders = [];
      var i = 0;

      // Protect display math ($$...$$) first
      text = text.replace(/\$\$[\s\S]*?\$\$/g, function(match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect inline math ($...$)
      text = text.replace(/\$[^$\n]+?\$/g, function(match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect \[...\] display math
      text = text.replace(/\\\[[\s\S]*?\\\]/g, function(match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect \(...\) inline math
      text = text.replace(/\\\([\s\S]*?\\\)/g, function(match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // 2. Parse markdown to HTML
      var html = marked.parse(text, { breaks: true });

      // 3. Restore LaTeX placeholders
      placeholders.forEach(function(p) {
        html = html.replace(p.id, p.content);
      });

      return html;
    }

    function renderSources(list) {
      if (!list || !list.length) {
        $("sources").innerHTML = "<div class=\"muted\">No sources retrieved.</div>";
        return;
      }
      var items = list.map(function(s) {
        var heading = s.heading ? (" — " + escapeHtml(s.heading)) : "";
        return "<li><strong>" + escapeHtml(s.tag || "") + "</strong> " +
               escapeHtml(s.source || "") + heading +
               " (chunk " + escapeHtml(String(s.chunk_id)) + ")</li>";
      }).join("");
      $("sources").innerHTML = "<div><strong>Sources</strong></div><ul>" + items + "</ul>";
    }

    async function typesetMath() {
      if (window.MathJax && MathJax.typesetPromise) {
        try { await MathJax.typesetPromise(); } catch (e) {}
      }
    }

    async function ask() {
      setError("");
      $("notes").innerHTML = "";
      $("extra").innerHTML = "";
      $("extraBox").style.display = "none";
      $("cov").style.display = "none";
      $("sources").innerHTML = "";

      var question = $("q").value.trim();
      if (!question) {
        setError("Please enter a question.");
        return;
      }

      var payload = {
        question: question,
        extra_mode: $("extraMode").value
      };

      $("askBtn").disabled = true;
      setStatus("Thinking…");

      try {
        var r = await fetch("/rag2/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        var text = await r.text();
        if (!r.ok) throw new Error("HTTP " + r.status + "\n" + text);

        var j;
        try { j = JSON.parse(text); }
        catch (e) { throw new Error("Backend returned non-JSON:\n" + text.slice(0, 800)); }

        // Render markdown + protect LaTeX
        $("notes").innerHTML = renderMarkdown(j.answer_notes);
        renderSources(j.sources || []);

        if (j.coverage) {
          $("cov").textContent = "coverage: " + j.coverage;
          $("cov").style.display = "inline-block";
        }

        if (j.answer_extra) {
          $("extra").innerHTML = renderMarkdown(j.answer_extra);
          $("extraBox").style.display = "block";
          if (j.coverage && j.coverage !== "full") $("extraBox").open = true;
        }

        await typesetMath();
        setStatus("Done.");
      } catch (e) {
        setError(String(e));
        setStatus("Error");
      } finally {
        $("askBtn").disabled = false;
      }
    }

    function boot() {
      setStatus("UI ready");
      $("askBtn").addEventListener("click", ask);
      $("q").addEventListener("keydown", function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") ask();
      });

      window.addEventListener("error", function(e) {
        setError("JS error: " + (e.message || "unknown"));
        setStatus("Error");
      });
      window.addEventListener("unhandledrejection", function(e) {
        setError("Promise error: " + (e.reason || "unknown"));
        setStatus("Error");
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
</body>
</html>
