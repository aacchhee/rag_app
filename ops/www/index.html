<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RAG Assistant</title>

  <link rel="stylesheet" href="style.css">

  <!-- Marked.js -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- MathJax -->
  <script>
    window.MathJax = {
      tex: {
        inlineMath: [['\\(', '\\)'], ['$', '$']],
        displayMath: [['\\[', '\\]'], ['$$', '$$']],
        processEscapes: true
      },
      options: { skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code'] }
    };
  </script>
  <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
  <div class="wrap">

    <!-- Navigation topbar -->
    <nav class="nav-topbar">
      <a href="/rag2/" class="active" title="Ask a question">
        <span class="nav-icon">💬</span> Question
      </a>
      <a href="/rag2/quiz.html" title="Take a quiz">
        <span class="nav-icon">📝</span> Quiz
      </a>
      <span class="spacer"></span>
      <a class="back-link" href="/" title="Back to notes site"><- Notes</a>
    </nav>

    <div class="card">
      <div class="topbar">
        <h1>Notes-first RAG Assistant with Qdrant</h1>
      </div>

      <div class="muted">
        Backend: <code>/rag2/ask</code> — UI: <code>/rag2/</code>.
      </div>

      <label for="q">Question</label>
      <textarea id="q" placeholder="Ask something… (math is OK)"></textarea>

      <div class="row">
        <button id="askBtn" type="button">Ask</button>
        <button id="problemBtn" class="problem-btn" type="button" style="display:none">Problem</button>

        <label class="muted" style="display:flex; align-items:center; gap:8px;" id="extraModeLabel">
          Extra mode:
          <select id="extraMode">
            <option value="auto" selected>auto</option>
            <option value="always">always</option>
            <option value="never">never</option>
          </select>
        </label>

        <label class="mode-toggle">
          <input type="checkbox" id="chatMode"> Chat mode
        </label>

        <span id="status" class="muted"></span>
      </div>

      <!-- Single question view -->
      <div id="singleView" class="section">
        <h2>From the notes <span id="cov" class="pill" style="display:none;"></span></h2>
        <div id="notes" class="answer"></div>

        <div id="sources" class="sources"></div>

        <details id="extraBox" style="display:none;">
          <br>
          <summary>Extra context (not from notes)</summary>
          <div id="extra" class="answer" style="margin-top:10px;"></div>
        </details>

        <!-- Problem section (appears after answer) -->
        <div id="problemSection" class="problem-section" style="display:none;">
          <br>
          <h2>Practice Problem</h2>
          <div id="problemContent" class="problem-box"></div>

          <div class="problem-reveal-area">
            <button id="revealAnswerBtn" class="reveal-answer-btn" type="button">Reveal answer</button>
            <div id="problemAnswerBox" class="problem-answer-box" style="display:none;"></div>
          </div>

          <div id="answerInputArea" class="answer-input-area">
            <label for="studentAnswer">Your answer:</label>
            <textarea id="studentAnswer" class="answer-input"
              placeholder="Enter your answer here… (LaTeX is OK, e.g. $\frac{1}{2}$)"></textarea>
            <div class="row">
              <button id="submitAnswerBtn" class="submit-answer-btn" type="button">Check my answer</button>
              <button id="newProblemBtn" class="new-problem-btn" type="button">New problem</button>
            </div>
          </div>

          <div id="assessmentBox" class="assessment-box"></div>
        </div>
      </div>

      <!-- Chat conversation view -->
      <div id="chatView" class="chat-container">
        <div class="chat-header">
          <h2>Conversation <span id="turnCount" class="chat-turn-count"></span></h2>
          <button class="chat-clear" id="clearChat">New conversation</button>
        </div>
        <div class="chat-scroll" id="chatScroll"></div>
      </div>

      <div id="err" class="err"></div>
    </div>
  </div>

  <script>
    function $(id) { return document.getElementById(id); }
    function setStatus(msg) { $("status").textContent = msg || ""; }
    function setError(msg) { $("err").textContent = msg || ""; }

    function escapeHtml(str) {
      return String(str || "").replace(/[&<>"']/g, function (c) {
        return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
      });
    }

    /**
     * Render markdown to HTML safely.
     * Protects LaTeX delimiters from being mangled by the markdown parser.
     */
    function renderMarkdown(text) {
      if (!text) return "";

      // 1. Protect LaTeX blocks by replacing them with placeholders
      var placeholders = [];
      var i = 0;

      // Protect display math ($$...$$) first
      text = text.replace(/\$\$[\s\S]*?\$\$/g, function (match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect inline math ($...$)
      text = text.replace(/\$[^$\n]+?\$/g, function (match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect \[...\] display math
      text = text.replace(/\\\[[\s\S]*?\\\]/g, function (match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // Protect \(...\) inline math
      text = text.replace(/\\\([\s\S]*?\\\)/g, function (match) {
        var id = "%%MATHBLOCK" + (i++) + "%%";
        placeholders.push({ id: id, content: match });
        return id;
      });

      // 2. Parse markdown to HTML
      var html = marked.parse(text, { breaks: true });

      // 3. Restore LaTeX placeholders
      placeholders.forEach(function (p) {
        html = html.replace(p.id, p.content);
      });

      return html;
    }

    function stripEmbeddedAnswer(problemText) {
      if (!problemText) return "";
      return String(problemText)
        .replace(/\n?\s*\*{0,2}\s*ANSWER\s*\*{0,2}\s*:\s*[\s\S]*$/i, "")
        .trim();
    }

    function showThinking(targetId) {
      $(targetId).innerHTML =
        '<div class="thinking">' +
        '<div class="thinking-dots"><span></span><span></span><span></span></div>' +
        ' Thinking…' +
        '</div>';
    }

    function renderSources(list) {
      if (!list || !list.length) {
        $("sources").innerHTML = "<div class=\"muted\">No sources retrieved.</div>";
        return;
      }
      var items = list.map(function (s) {
        var heading = s.heading ? (" — " + escapeHtml(s.heading)) : "";
        return "<li><strong>" + escapeHtml(s.tag || "") + "</strong> " +
          escapeHtml(s.source || "") + heading +
          " (chunk " + escapeHtml(String(s.chunk_id)) + ")</li>";
      }).join("");
      $("sources").innerHTML = "<div><strong>Sources</strong></div><ul>" + items + "</ul>";
    }

    async function typesetMath() {
      if (window.MathJax && MathJax.typesetPromise) {
        try {
          MathJax.startup.document.clear();
          MathJax.startup.document.updateDocument();
          await MathJax.typesetPromise();
        } catch (e) { }
      }
    }

    // Streaming state
    var isChatMode = false;
    var chatHistory = []; // [{question, answer}]
    var rawNotes = "";
    var rawExtra = "";
    var mathRenderTimer = null;
    var lastQuestion = "";       // last question asked (for problem generation)
    var lastNotesAnswer = "";    // last notes answer (for problem context)
    var currentProblemRaw = "";  // raw problem text from LLM
    var currentCorrectAnswer = "";
    var isAnswerRevealed = false;

    var MAX_TURNS = 20;

    // Chat rendering
    function renderChatConversation() {
      var scroll = $("chatScroll");
      if (chatHistory.length === 0) {
        scroll.innerHTML = '<div style="padding:30px;text-align:center;color:#aaa;">Start a conversation by asking a question.</div>';
        $("turnCount").textContent = "";
        return;
      }

      var html = "";
      for (var i = 0; i < chatHistory.length; i++) {
        var turn = chatHistory[i];

        // User bubble
        html += '<div class="chat-bubble user">';
        html += '<div class="chat-bubble-label">You</div>';
        html += '<div class="chat-bubble-content">' + escapeHtml(turn.question) + '</div>';
        html += '</div>';

        // Assistant bubble
        html += '<div class="chat-bubble assistant">';
        html += '<div class="chat-bubble-label">Assistant</div>';
        html += '<div class="chat-bubble-content">' + renderMarkdown(turn.answer) + '</div>';
        if (turn.coverage) {
          html += '<div class="chat-bubble-meta"><span class="pill">' + escapeHtml(turn.coverage) + '</span></div>';
        }
        html += '</div>';
      }

      scroll.innerHTML = html;
      $("turnCount").textContent = "(" + chatHistory.length + "/" + MAX_TURNS + " turns)";

      // Scroll to bottom
      scroll.scrollTop = scroll.scrollHeight;
      typesetMath();
    }

    function addStreamingBubbles(question) {
      var scroll = $("chatScroll");

      // Remove placeholder if present
      var placeholder = scroll.querySelector("div[style]");
      if (placeholder && placeholder.textContent.includes("Start a conversation")) {
        placeholder.remove();
      }

      // User bubble
      var userBubble = document.createElement("div");
      userBubble.className = "chat-bubble user";
      userBubble.innerHTML =
        '<div class="chat-bubble-label">You</div>' +
        '<div class="chat-bubble-content">' + escapeHtml(question) + '</div>';
      scroll.appendChild(userBubble);

      // Assistant bubble (streaming target)
      var assistantBubble = document.createElement("div");
      assistantBubble.className = "chat-bubble assistant";
      assistantBubble.innerHTML =
        '<div class="chat-bubble-label">Assistant</div>' +
        '<div class="chat-bubble-content streaming-cursor" id="chatStreamTarget">' +
        '<div class="thinking">' +
        '<div class="thinking-dots"><span></span><span></span><span></span></div>' +
        ' Thinking…</div>' +
        '</div>';
      scroll.appendChild(assistantBubble);

      scroll.scrollTop = scroll.scrollHeight;
    }

    function updateStreamingBubble(rawText) {
      var target = document.getElementById("chatStreamTarget");
      if (target) {
        target.innerHTML = renderMarkdown(rawText);
        target.classList.add("streaming-cursor");
        var scroll = $("chatScroll");
        scroll.scrollTop = scroll.scrollHeight;
      }

      clearTimeout(mathRenderTimer);
      mathRenderTimer = setTimeout(function () { typesetMath(); }, 400);
    }

    function finalizeStreamingBubble(coverage) {
      var target = document.getElementById("chatStreamTarget");
      if (target) {
        target.classList.remove("streaming-cursor");
        target.removeAttribute("id");

        if (coverage) {
          var metaDiv = document.createElement("div");
          metaDiv.className = "chat-bubble-meta";
          metaDiv.innerHTML = '<span class="pill">' + escapeHtml(coverage) + '</span>';
          target.parentElement.appendChild(metaDiv);
        }
      }

      $("turnCount").textContent = "(" + chatHistory.length + "/" + MAX_TURNS + " turns)";
    }

    // Mode switching
    function switchMode(toChat) {
      isChatMode = toChat;

      if (toChat) {
        $("singleView").style.display = "none";
        $("chatView").classList.add("visible");
        $("extraModeLabel").style.display = "none";
        $("problemBtn").style.display = "none";
        renderChatConversation();
      } else {
        $("singleView").style.display = "block";
        $("chatView").classList.remove("visible");
        $("extraModeLabel").style.display = "flex";
        // Show problem button if we have a previous answer
        if (lastNotesAnswer) {
          $("problemBtn").style.display = "inline-block";
        }
      }
    }

    // Streaming
    function scheduleRender(targetId, rawText) {
      // Render markdown immediately for text, defer MathJax
      $(targetId).innerHTML = renderMarkdown(rawText);
      $(targetId).classList.add("streaming-cursor");

      // Debounce MathJax (expensive, don't run on every token)
      clearTimeout(mathRenderTimer);
      mathRenderTimer = setTimeout(function () { typesetMath(); }, 400);
    }

    function hideProblemAnswer() {
      isAnswerRevealed = false;
      $("problemAnswerBox").style.display = "none";
      $("problemAnswerBox").classList.remove("streaming-cursor");
      $("revealAnswerBtn").textContent = "Reveal answer";
    }

    async function fetchCorrectAnswer(revealInUi) {
      if (currentCorrectAnswer) {
        if (revealInUi) {
          $("problemAnswerBox").style.display = "block";
          $("problemAnswerBox").innerHTML = renderMarkdown(currentCorrectAnswer);
          $("problemAnswerBox").classList.remove("streaming-cursor");
          $("revealAnswerBtn").textContent = "Hide answer";
          isAnswerRevealed = true;
          await typesetMath();
        }
        return currentCorrectAnswer;
      }

      var revealBtn = $("revealAnswerBtn");
      revealBtn.disabled = true;

      if (revealInUi) {
        $("problemAnswerBox").style.display = "block";
        showThinking("problemAnswerBox");
      }

      var answerRaw = "";

      try {
        var response = await fetch("/rag2/calculate-answer", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            problem: currentProblemRaw,
            question: lastQuestion,
            notes_answer: lastNotesAnswer
          })
        });

        if (!response.ok) {
          var errText = await response.text();
          throw new Error("HTTP " + response.status + "\n" + errText);
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";
        var currentEvent = null;
        var streamError = "";

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          buffer += decoder.decode(result.value, { stream: true });

          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            if (line.startsWith("event: ")) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith("data: ") && currentEvent) {
              var data;
              try { data = JSON.parse(line.slice(6)); }
              catch (e) { continue; }

              if (currentEvent === "token") {
                answerRaw += data.content;
                if (revealInUi) {
                  $("problemAnswerBox").innerHTML = renderMarkdown(answerRaw);
                  $("problemAnswerBox").classList.add("streaming-cursor");
                  clearTimeout(mathRenderTimer);
                  mathRenderTimer = setTimeout(function () { typesetMath(); }, 400);
                }
              } else if (currentEvent === "status" && data.phase === "generating" && revealInUi) {
                $("problemAnswerBox").innerHTML = "";
              } else if (currentEvent === "error") {
                streamError = data.message || "Could not generate answer.";
              }

              currentEvent = null;
            } else if (line === "") {
              currentEvent = null;
            }
          }
        }

        if (streamError) {
          throw new Error(streamError);
        }

        currentCorrectAnswer = answerRaw.trim();
        if (!currentCorrectAnswer) {
          throw new Error("No answer was generated.");
        }

        if (revealInUi) {
          $("problemAnswerBox").classList.remove("streaming-cursor");
          $("problemAnswerBox").innerHTML = renderMarkdown(currentCorrectAnswer);
          $("revealAnswerBtn").textContent = "Hide answer";
          isAnswerRevealed = true;
          await typesetMath();
        }

        return currentCorrectAnswer;
      } finally {
        revealBtn.disabled = false;
      }
    }

    async function toggleRevealAnswer() {
      setError("");

      if (isAnswerRevealed) {
        hideProblemAnswer();
        setStatus("Answer hidden.");
        return;
      }

      if (!currentProblemRaw) {
        setError("Generate a problem first.");
        return;
      }

      setStatus("Calculating answer...");
      try {
        await fetchCorrectAnswer(true);
        setStatus("Answer revealed.");
      } catch (e) {
        setError(String(e));
        setStatus("Error");
        hideProblemAnswer();
      }
    }

    // Problem generation
    async function generateProblem() {
      setError("");
      currentProblemRaw = "";
      currentCorrectAnswer = "";
      isAnswerRevealed = false;

      // Reset problem UI
      $("problemSection").style.display = "block";
      $("problemSection").classList.add("visible");
      $("answerInputArea").classList.remove("visible");
      $("assessmentBox").classList.remove("visible");
      $("assessmentBox").innerHTML = "";
      $("studentAnswer").value = "";
      $("problemAnswerBox").style.display = "none";
      $("problemAnswerBox").innerHTML = "";
      $("problemAnswerBox").classList.remove("streaming-cursor");
      $("revealAnswerBtn").textContent = "Reveal answer";
      $("revealAnswerBtn").disabled = true;
      showThinking("problemContent");

      $("problemBtn").disabled = true;
      setStatus("Generating problem…");

      try {
        var response = await fetch("/rag2/problem", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: lastQuestion,
            notes_answer: lastNotesAnswer
          })
        });

        if (!response.ok) {
          var errText = await response.text();
          throw new Error("HTTP " + response.status + "\n" + errText);
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";
        var currentEvent = null;

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          buffer += decoder.decode(result.value, { stream: true });

          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            if (line.startsWith("event: ")) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith("data: ") && currentEvent) {
              var data;
              try { data = JSON.parse(line.slice(6)); }
              catch (e) { continue; }

              if (currentEvent === "token") {
                currentProblemRaw += data.content;
                $("problemContent").innerHTML = renderMarkdown(stripEmbeddedAnswer(currentProblemRaw));
                $("problemContent").classList.add("streaming-cursor");
                clearTimeout(mathRenderTimer);
                mathRenderTimer = setTimeout(function () { typesetMath(); }, 400);
              } else if (currentEvent === "status") {
                if (data.phase === "generating") {
                  $("problemContent").innerHTML = "";
                }
              }

              currentEvent = null;
            } else if (line === "") {
              currentEvent = null;
            }
          }
        }

        // Final render
        currentProblemRaw = stripEmbeddedAnswer(currentProblemRaw);
        $("problemContent").classList.remove("streaming-cursor");
        $("problemContent").innerHTML = renderMarkdown(currentProblemRaw);
        $("revealAnswerBtn").disabled = false;

        // Show answer input
        $("answerInputArea").classList.add("visible");

        await typesetMath();
        setStatus("Problem ready — try solving it!");

      } catch (e) {
        setError(String(e));
        setStatus("Error");
      } finally {
        $("problemBtn").disabled = false;
      }
    }

    // Answer assessment
    async function submitAnswer() {
      setError("");

      if (!currentProblemRaw) {
        setError("Generate a problem first.");
        return;
      }

      var studentAnswer = $("studentAnswer").value.trim();
      if (!studentAnswer) {
        setError("Please enter your answer.");
        return;
      }

      $("assessmentBox").classList.add("visible");
      showThinking("assessmentBox");

      $("submitAnswerBtn").disabled = true;
      setStatus("Checking your answer…");

      var assessRaw = "";

      try {
        if (!currentCorrectAnswer) {
          setStatus("Preparing answer key...");
          await fetchCorrectAnswer(false);
        }

        var response = await fetch("/rag2/assess", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            problem: currentProblemRaw,
            correct_answer: currentCorrectAnswer,
            student_answer: studentAnswer
          })
        });

        if (!response.ok) {
          var errText = await response.text();
          throw new Error("HTTP " + response.status + "\n" + errText);
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";
        var currentEvent = null;
        var streamError = "";

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          buffer += decoder.decode(result.value, { stream: true });

          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            if (line.startsWith("event: ")) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith("data: ") && currentEvent) {
              var data;
              try { data = JSON.parse(line.slice(6)); }
              catch (e) { continue; }

              if (currentEvent === "token") {
                assessRaw += data.content;
                $("assessmentBox").innerHTML = renderMarkdown(assessRaw);
                $("assessmentBox").classList.add("streaming-cursor");
                clearTimeout(mathRenderTimer);
                mathRenderTimer = setTimeout(function () { typesetMath(); }, 400);
              } else if (currentEvent === "error") {
                streamError = data.message || "Could not assess answer.";
              }

              currentEvent = null;
            } else if (line === "") {
              currentEvent = null;
            }
          }
        }

        if (streamError) {
          throw new Error(streamError);
        }

        // Final render
        $("assessmentBox").classList.remove("streaming-cursor");
        $("assessmentBox").innerHTML = renderMarkdown(assessRaw);

        await typesetMath();
        setStatus("Done.");

      } catch (e) {
        $("assessmentBox").classList.remove("streaming-cursor");
        $("assessmentBox").innerHTML = "<div class=\"muted\">Assessment failed. Please try again.</div>";
        setError(String(e));
        setStatus("Error");
      } finally {
        $("submitAnswerBtn").disabled = false;
      }
    }

    // Main ask function
    async function ask() {
      setError("");
      rawNotes = "";
      rawExtra = "";

      // Hide problem section when asking new question
      $("problemSection").style.display = "none";
      $("problemSection").classList.remove("visible");
      $("problemBtn").style.display = "none";
      currentProblemRaw = "";
      currentCorrectAnswer = "";
      isAnswerRevealed = false;
      $("problemAnswerBox").innerHTML = "";
      $("problemAnswerBox").style.display = "none";
      $("problemAnswerBox").classList.remove("streaming-cursor");
      $("revealAnswerBtn").textContent = "Reveal answer";
      $("revealAnswerBtn").disabled = false;

      var question = $("q").value.trim();
      if (!question) {
        setError("Please enter a question.");
        return;
      }

      // Check turn limit in chat mode
      if (isChatMode && chatHistory.length >= MAX_TURNS) {
        setError("Conversation limit reached (" + MAX_TURNS + " turns). Click 'New conversation' to start fresh.");
        return;
      }

      var payload = {
        question: question,
        extra_mode: $("extraMode").value,
        chat_mode: isChatMode,
        history: isChatMode ? chatHistory : []
      };

      $("askBtn").disabled = true;
      $("q").value = "";

      if (isChatMode) {
        addStreamingBubbles(question);
        setStatus("Thinking…");
      } else {
        $("notes").innerHTML = "";
        $("extra").innerHTML = "";
        $("extraBox").style.display = "none";
        $("cov").style.display = "none";
        $("sources").innerHTML = "";
        showThinking("notes");
        setStatus("Thinking…");
      }

      // Store question for problem generation
      lastQuestion = question;

      try {
        var response = await fetch("/rag2/ask-stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!response.ok) {
          var errText = await response.text();
          throw new Error("HTTP " + response.status + "\n" + errText);
        }

        var reader = response.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";
        var streamCoverage = "";
        var currentEvent = null;

        while (true) {
          var result = await reader.read();
          if (result.done) break;

          buffer += decoder.decode(result.value, { stream: true });

          // Process complete SSE messages
          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var i = 0; i < lines.length; i++) {
            var line = lines[i];

            if (line.startsWith("event: ")) {
              currentEvent = line.slice(7).trim();
            } else if (line.startsWith("data: ") && currentEvent) {
              var data;
              try { data = JSON.parse(line.slice(6)); }
              catch (e) { continue; }

              if (currentEvent === "notes_done" || currentEvent === "done") {
                if (data.coverage) streamCoverage = data.coverage;
              }

              handleSSE(currentEvent, data);
              currentEvent = null;
            } else if (line === "") {
              currentEvent = null;
            }
          }
        }

        // Final render
        if (isChatMode) {
          chatHistory.push({
            question: question,
            answer: rawNotes,
            coverage: streamCoverage
          });
          finalizeStreamingBubble(streamCoverage);
        } else {
          $("notes").classList.remove("streaming-cursor");
          $("extra").classList.remove("streaming-cursor");
          $("notes").innerHTML = renderMarkdown(rawNotes);
          if (rawExtra) {
            $("extra").innerHTML = renderMarkdown(rawExtra);
          }

          // Store answer and show problem button
          lastNotesAnswer = rawNotes;
          $("problemBtn").style.display = "inline-block";
        }

        await typesetMath();
        setStatus("Done.");

      } catch (e) {
        setError(String(e));
        setStatus("Error");
      } finally {
        $("askBtn").disabled = false;
        if (!isChatMode) {
          $("notes").classList.remove("streaming-cursor");
          $("extra").classList.remove("streaming-cursor");
        }
      }
    }

    function handleSSE(event, data) {
      switch (event) {
        case "status":
          if (data.phase === "thinking") {
            setStatus("Searching notes…");
            if (!isChatMode) showThinking("notes");
          } else if (data.phase === "notes") {
            setStatus("Writing answer…");
            if (!isChatMode) $("notes").innerHTML = "";
            if (isChatMode) {
              var target = document.getElementById("chatStreamTarget");
              if (target) target.innerHTML = "";
            }
          } else if (data.phase === "extra") {
            setStatus("Adding extra context…");
            $("extraBox").style.display = "block";
            $("extraBox").open = true;
            showThinking("extra");
          }
          break;

        case "sources":
          if (!isChatMode) {
            renderSources(data);
          }
          break;

        case "token":
          if (data.target === "notes") {
            rawNotes += data.content;
            if (isChatMode) {
              updateStreamingBubble(rawNotes);
            } else {
              scheduleRender("notes", rawNotes);
            }
          } else if (data.target === "extra") {
            if (!isChatMode) {
              if ($("extra").querySelector(".thinking")) {
                $("extra").innerHTML = "";
              }
              rawExtra += data.content;
              scheduleRender("extra", rawExtra);
            }
          }
          break;

        case "notes_done":
          if (!isChatMode) {
            $("notes").classList.remove("streaming-cursor");
            if (data.coverage) {
              $("cov").textContent = "coverage: " + data.coverage;
              $("cov").style.display = "inline-block";
            }
          }
          break;

        case "extra_done":
          if (!isChatMode) {
            $("extra").classList.remove("streaming-cursor");
          }
          break;

        case "done":
          break;
      }
    }

    function boot() {
      setStatus("UI ready");
      $("askBtn").addEventListener("click", ask);
      $("q").addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") ask();
      });

      // Mode toggle
      $("chatMode").addEventListener("change", function () {
        switchMode(this.checked);
      });

      // Clear chat
      $("clearChat").addEventListener("click", function () {
        chatHistory = [];
        rawNotes = "";
        rawExtra = "";
        renderChatConversation();
      });

      // Problem generation
      $("problemBtn").addEventListener("click", generateProblem);

      // Reveal/hide generated answer
      $("revealAnswerBtn").addEventListener("click", toggleRevealAnswer);

      // New problem button
      $("newProblemBtn").addEventListener("click", generateProblem);

      // Submit answer for assessment
      $("submitAnswerBtn").addEventListener("click", submitAnswer);

      // Enter in answer field submits
      $("studentAnswer").addEventListener("keydown", function (e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "Enter") submitAnswer();
      });

      window.addEventListener("error", function (e) {
        setError("JS error: " + (e.message || "unknown"));
        setStatus("Error");
      });
      window.addEventListener("unhandledrejection", function (e) {
        setError("Promise error: " + (e.reason || "unknown"));
        setStatus("Error");
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", boot);
    } else {
      boot();
    }
  </script>
</body>

</html>
